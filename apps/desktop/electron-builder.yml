appId: com.detaches.agent
productName: Detaches Agent
directories:
  output: ../../release
files:
  - dist/**
  - package.json
asar: true
extraResources:
  - from: ../../.desktop-runtime/app
    to: app
extraMetadata:
  main: dist/main.js
win:
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
  target:
    - target: nsis
      arch:
        - x64
  artifactName: detaches-agent-${version}-win-${arch}-setup.${ext}
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: detaches-agent-${version}-mac-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Detaches Agent
publish: null
